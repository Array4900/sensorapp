server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL Configuration
    ssl_certificate /etc/ssl/certs/your-cert.crt;
    ssl_certificate_key /etc/ssl/private/your-key.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # Root directory
    root /app/build;
    index index.html;

    # Service Worker - NO CACHE
    location = /service-worker.js {
        add_header Cache-Control "max-age=0, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    # Manifest - can be cached
    location = /manifest.json {
        add_header Content-Type "application/manifest+json" always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # PWA Icons - long cache with hash
    location ~ ^/icon-.*\.(png|svg|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Static assets with hash - long cache
    location ~ ^/_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Static files - cache but allow revalidation
    location ~ \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA Routing - fallback to index.html for all routes
    location / {
        # Don't cache HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        
        # Try file, then directory, then fallback to index.html
        try_files $uri $uri/ /index.html =404;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ ~$ {
        deny all;
        return 404;
    }
}

# HTTP to HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    return 301 https://$server_name$request_uri;
}
