services:
  # 1. Databáza (Mongo)
  db:
    image: mongo:latest
    container_name: sensor_db
    restart: always
    ports:
      - "${DB_BIND_ADDRESS:-127.0.0.1}:27018:27017" # Prístup z hosta len cez lokálny bind, ak nie je explicitne zmenený
    volumes:
      - ./mongodb_data:/data/db
    networks:
      - sensor-network

  # 2. Backend (Express)
  api:
    build: ./backend
    container_name: sensor_api
    restart: always
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:5000:5000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - MONGO_URI=${MONGO_URI}
      - PORT=${PORT}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL}

      - MQTT_BROKER_URL=${MQTT_BROKER_URL}
      - MQTT_TOPIC=${MQTT_TOPIC}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    depends_on:
      - db
      - mosquitto
    networks:
      - sensor-network

  # 3. Frontend (SvelteKit)
  web:
    build: ./frontend
    container_name: sensor_web
    restart: always
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:3000:3000"
    environment:
      # URL cez ktoru vola prehliadac backend (pre produkciu cez Cloudflare tunel, pre testovanie a vývoj cez Docker sieť)
      - PUBLIC_API_URL=${PUBLIC_API_URL}

      - PUBLIC_VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      # SvelteKit server (SSR) stále volá backend interne cez Docker sieť
      - INTERNAL_API_URL=${INTERNAL_API_URL}
    depends_on:
      - api
    networks:
      - sensor-network

  # 4. MQTT Broker (Mosquitto)
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: always
    ports:
      - "${MQTT_BIND_ADDRESS:-0.0.0.0}:1883:1883"   # Predvolene dostupné v LAN; pre verejný internet doplniť TLS/ACL
      - "${MQTT_WS_BIND_ADDRESS:-127.0.0.1}:9001:9001"   # WebSockets port
    volumes:
      # Namontujeme celý config priečinok
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - sensor-network
  tunnel:
    container_name: cloudflared-tunnel
    image: cloudflare/cloudflared:latest
    restart: always
    profiles:
      - prod
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      - api  # Tunel sa spustí až keď beží backend
    networks:
      - sensor-network

networks:
  sensor-network:
    driver: bridge